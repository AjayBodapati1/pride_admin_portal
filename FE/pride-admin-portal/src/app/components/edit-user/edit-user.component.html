<div class="container">
  <h2>Manage & Edit Users</h2>

  <ag-grid-angular
    style="width: 100%; height: 500px"
    class="ag-theme-alpine"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [pagination]="true"
    [paginationPageSize]="10"
  >
  </ag-grid-angular>

  <div class="modal-backdrop" *ngIf="isModalOpen">
    <div class="modal-content">
      <h3>Edit User Details</h3>
      <hr />

      <form [formGroup]="editForm" (ngSubmit)="onSubmitUpdate()">
        <div class="form-grid">
          <div class="form-group">
            <label for="userName">Name</label>
            <input
              type="text"
              id="userName"
              formControlName="name"
              placeholder="Enter full name"
            />
          </div>

          <div class="form-group">
            <label for="userEmail">Email (Read-only)</label>
            <input
              type="email"
              id="userEmail"
              formControlName="email"
              placeholder="email@example.com"
            />
          </div>

          <div class="form-group">
            <label for="userDob">Date of Birth</label>
            <input type="date" id="userDob" formControlName="dateOfBirth" />
          </div>

          <div class="form-group">
            <label for="userFatherName">Father's Name</label>
            <input
              type="text"
              id="userFatherName"
              formControlName="fatherName"
              placeholder="Enter father's name"
            />
          </div>

          <div class="form-group">
            <label for="userMobile">Mobile Number</label>
            <input
              type="text"
              id="userMobile"
              formControlName="mobileNumber"
              placeholder="10-digit mobile number"
            />
          </div>

          <div class="form-group">
            <label for="userDoj">Date of Joining</label>
            <input type="date" id="userDoj" formControlName="dateOfJoining" />
          </div>

          <div class="form-group">
            <label for="userPassword">Password</label>
            <input
              type="password"
              id="userPassword"
              formControlName="password"
              placeholder="Enter password"
            />
          </div>

          <div class="form-group">
            <label for="userRole">Role</label>
            <input
              type="text"
              id="userRole"
              formControlName="role"
              placeholder="e.g. employee"
            />
          </div>

          <div class="form-group checkbox-group">
            <label for="userActive">
              <input type="checkbox" id="userActive" formControlName="active" />
              Active Status
            </label>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-cancel" (click)="closeModal()">
            Cancel
          </button>
          <button
            type="submit"
            class="btn-submit"
            [disabled]="editForm.invalid"
          >
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
